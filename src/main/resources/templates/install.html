<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Installation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Installation</h1>

    <p th:if="${error}" class="text-danger" th:text="${error}"></p>

    <p>Installation of users and products is done.</p>

    <ul>
    <li><p th:if="${runscript}" th:text="'Script ran successfully.'"></p></li>
    <li><p th:unless="${runscript}" th:text="'Script did not run.'"></p></li>

    <li>
        Created users and products successfully. Number of users: <span th:text="${createdUsers}">SCM</span> is ready to use.
    </li>
    </ul>

    <p th:if="${message}" th:text="${message}"></p>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
