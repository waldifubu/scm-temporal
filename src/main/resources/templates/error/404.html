<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!--<nav th:replace="~{common/header :: header}"></nav>-->

<div class="container text-center my-5">
    <h1 class="display-1 text-warning">404</h1>
    <h2>Page Not Found</h2>

    <p class="text-muted my-3">
        The page <strong th:text="${path}"></strong> could not be found (any more).
    </p>

    <a th:href="@{/}" class="btn btn-primary">Back to home</a>
</div>

<!--<span th:replace="~{common/footer :: footer}"></span>-->
</body>
</html>
