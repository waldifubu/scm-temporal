<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Internal Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<!--<nav th:replace="~{common/header :: header}"></nav>-->

<div class="container text-center my-5">
    <h1 class="display-1 text-danger">500</h1>
    <h2>Interner Serverfehler</h2>

    <p class="text-muted">
        An error occurred while processing the request <strong th:text="${path}"></strong>.<br/>
        Timestamp: <span th:text="${timestamp}"></span>
    </p>

    <p th:if="${message}" class="alert alert-warning" th:text="${message}"></p>

    <a th:href="@{/}" class="btn btn-primary">Back to Home</a>
</div>

<!--<span th:replace="~{common/footer :: footer}"></span>-->
</body>
</html>
